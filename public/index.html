<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kirang+Haerang&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1>💸 Expense Tracker</h1>

  <!-- ── Add Expense ────────────────────────────────────────── -->
  <div class="container">
    <h2>Add Expense</h2>
    <div class="sub-container" style="flex-direction:column; gap:10px;">
      <form id="expense-form" onsubmit="handleSubmit(event)">
        <input type="text"   id="inp-desc"     placeholder="Description"  required />
        <input type="number" id="inp-amount"   placeholder="Amount (₹)"   min="0.01" step="0.01" required />
        <select id="inp-category">
          <option value="food">🍔 Food</option>
          <option value="travel">✈️ Travel</option>
          <option value="shopping">🛍️ Shopping</option>
          <option value="other">📦 Other</option>
        </select>
        <input type="date"   id="inp-date" />
        <button type="submit">+ Add Expense</button>
      </form>
      <div id="form-error" style="color:red; font-family:'Kirang Haerang',system-ui; display:none;"></div>
    </div>
  </div>

  <!-- ── Summary Cards ─────────────────────────────────────── -->
  <div class="container">
    <h2>Category Totals</h2>
    <div class="sub-container category-summary">
      <div class="category" id="cat-food">
        <div class="cat-label">🍔 Food</div>
        <div class="cat-total" id="total-food">₹0.00</div>
      </div>
      <div class="category" id="cat-travel">
        <div class="cat-label">✈️ Travel</div>
        <div class="cat-total" id="total-travel">₹0.00</div>
      </div>
      <div class="category" id="cat-shopping">
        <div class="cat-label">🛍️ Shopping</div>
        <div class="cat-total" id="total-shopping">₹0.00</div>
      </div>
      <div class="category" id="cat-other">
        <div class="cat-label">📦 Other</div>
        <div class="cat-total" id="total-other">₹0.00</div>
      </div>
    </div>
    <div class="total-all">Grand Total: <span id="grand-total">₹0.00</span></div>
  </div>

  <!-- ── Charts ────────────────────────────────────────────── -->
  <div class="container chart-container">
    <h2>Charts</h2>
    <div class="charts-row">
      <div class="chart-box">
        <h3>Spending by Category</h3>
        <canvas id="pieChart" height="230"></canvas>
      </div>
      <div class="chart-box">
        <h3>Daily Spending (Last 7 Days)</h3>
        <canvas id="barChart" height="230"></canvas>
      </div>
    </div>
  </div>

  <!-- ── Expense List ──────────────────────────────────────── -->
  <div class="container">
    <h2>All Expenses</h2>

    <div class="filter-row">
      <label style="font-family:'Kirang Haerang',system-ui;">Filter:</label>
      <select id="filter-category">
        <option value="">All Categories</option>
        <option value="food">🍔 Food</option>
        <option value="travel">✈️ Travel</option>
        <option value="shopping">🛍️ Shopping</option>
        <option value="other">📦 Other</option>
      </select>
      <input type="date" id="filter-date" />
      <button onclick="applyFilters()">Apply</button>
      <button onclick="clearFilters()">Clear</button>
    </div>

    <div class="sub-container expense-list-container">
      <ul id="expense-list">
        <li class="empty-state">Loading expenses…</li>
      </ul>
    </div>
  </div>

  <div id="toast"></div>

  <script src="script.js"></script>

</body>
</html>
